<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0;url=/EventEase/?redirect=%2F" />
    <title>Redirecting...</title>
    <script>
        (function () {
            var path = window.location.pathname + window.location.search + window.location.hash;
            var base = '/EventEase/';
            var redirectUrl = base + '?redirect=' + encodeURIComponent(path);
            window.location.replace(redirectUrl);
        })();
    </script>
</head>
<body>
    <p>Redirecting to the application...</p>
</body>
</html>
